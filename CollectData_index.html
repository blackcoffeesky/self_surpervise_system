<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活动记录 A++ · 修改功能</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    padding: 20px;
    max-width: 520px;
    margin: auto;
    background: #f5f9ff;
}

h2 { text-align:center; color:#1e3c5c; }

button {
    width: 100%;
    padding: 14px;
    margin: 8px 0;
    font-size: 16px;
    border: none;
    border-radius: 40px;
    background: #e3ebf6;
    cursor: pointer;
    transition: 0.15s;
    font-weight: 500;
}
button:hover { background: #c9d9ec; }

select {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    font-size: 16px;
    border-radius: 40px;
    border: 1px solid #bcccdc;
    background: white;
}

.current {
    padding: 18px;
    background: #d9e9ff;
    margin: 20px 0;
    border-radius: 28px;
    font-weight: 500;
    white-space: pre-line;
    box-shadow: 0 4px 8px rgba(0,40,80,0.08);
}

.smallBtn { background:#dee7f2; }
.danger { background:#ffe0e0; color:#aa2222; }
.danger:hover { background:#ffc9c9; }

.statBox { 
    margin-top: 30px; 
    background: white; 
    padding: 20px 18px; 
    border-radius: 32px; 
    box-shadow: 0 8px 24px rgba(0,20,50,0.05);
}

.statBox p {
    font-size: 1.1rem;
    margin: 10px 0;
    color: #1e3b58;
}

canvas {
    width: 100% !important;
    height: 220px !important;
    margin-top: 15px;
    border-radius: 16px;
    background: #fafdff;
}

.modal {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.4);
    display:none;
    justify-content:center;
    align-items:center;
    z-index: 1000;
}

.modalContent {
    background:white;
    padding: 28px 20px;
    width: 90%;
    max-width: 380px;
    border-radius: 36px;
    text-align:center;
    box-shadow: 0 25px 40px rgba(0,10,30,0.2);
}

.modalContent h3 {
    margin-top: 0;
    color: #1e3c5c;
    font-weight: 600;
}

.time-picker {
    margin: 20px 0 18px;
    text-align: left;
}

.time-picker label {
    font-weight: 600;
    font-size: 0.95rem;
    color: #2b4b6f;
    display: block;
    margin-bottom: 6px;
}

.time-picker input, .modalContent select {
    width: 100%;
    padding: 14px;
    border: 1px solid #b9cee8;
    border-radius: 50px;
    font-size: 1rem;
    box-sizing: border-box;
    background: #f2f8ff;
}

.modalContent .efficiency-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin: 18px 0;
}
.modalContent .efficiency-grid button {
    margin: 0;
    background: #eef4fb;
    border-radius: 40px;
    padding: 12px 5px;
    font-size: 0.95rem;
}
.modalContent .efficiency-grid button:hover {
    background: #d6e3f5;
}

.button-group {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}
.button-group button {
    margin: 0;
    flex: 1;
}
</style>
</head>
<body>

<h2>⏱️ 活动记录 A++</h2>

<div class="current" id="currentStatus">
当前无活动
</div>

<label>选择主题：</label>
<select id="subthemeSelect">
<option value="">-- 选择主题 --</option>
<option>嵌入式与机器视觉</option>
<option>考研准备</option>
<option>完善监督系统</option>
<option>强化学习&毕业设计</option>
<option>上课</option>
<option>运动</option>
<option>投资</option>
<option>反思&记录&总结</option>
</select>

<button onclick="startActivity()">▶ 开始活动</button>
<button onclick="endActivity()">⏹️ 结束活动</button>
<button onclick="switchActivity()">🔄 切换活动</button>
<button onclick="modifyLastActivity()">✏️ 修改最新活动</button>

<button onclick="clearCurrent()" class="smallBtn">🧹 清除当前活动</button>
<button onclick="clearAll()" class="danger">⚠️ 清空所有数据</button>
<button onclick="exportData()">📤 导出数据</button>

<div class="statBox">
<h3>📊 每日时长统计</h3>
<p id="todayStat">今日总时长：0 分钟</p>
<p id="totalStat">累计总时长：0 分钟</p>
<canvas id="dailyChart"></canvas>
<p id="noDataHint" style="font-size:0.9rem; color:#888; display:none;">暂无数据，开始记录吧</p>
</div>

<!-- 效率弹窗 (无时间选择) -->
<div class="modal" id="effModal">
<div class="modalContent">
<h3>⚡ 选择效率</h3>

<div class="efficiency-grid">
    <button onclick="selectEfficiency(0)">低 (0)</button>
    <button onclick="selectEfficiency(1)">偏低 (1)</button>
    <button onclick="selectEfficiency(2)">正常 (2)</button>
    <button onclick="selectEfficiency(3)">高 (3)</button>
    <button onclick="selectEfficiency(4)">极高 (4)</button>
    <button onclick="selectEfficiency(5)">无 (5)</button>
</div>

<button onclick="closeModal(false)" style="background:#e2e2e2;">取消</button>
</div>
</div>

<!-- 修改活动弹窗 -->
<div class="modal" id="modifyModal">
<div class="modalContent">
<h3>✏️ 修改最新活动</h3>

<div class="time-picker">
    <label>主题</label>
    <select id="modifyTheme">
        <option>嵌入式与机器视觉</option>
        <option>考研准备</option>
        <option>完善监督系统</option>
        <option>强化学习&毕业设计</option>
        <option>上课</option>
        <option>运动</option>
        <option>投资</option>
        <option>反思&记录&总结</option>
    </select>
</div>

<div class="time-picker">
    <label>开始时间</label>
    <input type="datetime-local" id="modifyStart">
</div>

<div class="time-picker">
    <label>结束时间</label>
    <input type="datetime-local" id="modifyEnd">
</div>

<div class="time-picker">
    <label>效率</label>
    <select id="modifyEfficiency">
        <option value="0">低 (0)</option>
        <option value="1">偏低 (1)</option>
        <option value="2">正常 (2)</option>
        <option value="3">高 (3)</option>
        <option value="4">极高 (4)</option>
        <option value="5">无 (5)</option>
    </select>
</div>

<div class="button-group">
    <button onclick="saveModify()" style="background:#4f7eb3; color:white;">保存</button>
    <button onclick="deleteLastActivity()" class="danger">删除</button>
</div>
<button onclick="closeModifyModal()" style="background:#e2e2e2; margin-top:10px;">取消</button>
</div>
</div>

<script>
// --- 数据与状态 ---
let currentActivity = JSON.parse(localStorage.getItem("currentActivity"));
let records = JSON.parse(localStorage.getItem("records")) || [];

let pendingAction = null;   // "end" 或 {type:"switch", newTheme}

function saveState(){
    localStorage.setItem("currentActivity", JSON.stringify(currentActivity));
    localStorage.setItem("records", JSON.stringify(records));
}

// 格式化时间为 "YYYY-MM-DD HH:MM"
function formatTime(date){
    const y = date.getFullYear();
    const m = String(date.getMonth()+1).padStart(2,'0');
    const d = String(date.getDate()).padStart(2,'0');
    const h = String(date.getHours()).padStart(2,'0');
    const min = String(date.getMinutes()).padStart(2,'0');
    return `${y}-${m}-${d} ${h}:${min}`;
}

// Date对象 → datetime-local 字符串 (YYYY-MM-DDTHH:MM)
function toDateTimeLocalString(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth()+1).padStart(2,'0');
    const d = String(date.getDate()).padStart(2,'0');
    const h = String(date.getHours()).padStart(2,'0');
    const min = String(date.getMinutes()).padStart(2,'0');
    return `${y}-${m}-${d}T${h}:${min}`;
}

// datetime-local 字符串 → 存储格式 (YYYY-MM-DD HH:MM)
function fromPickerToStorage(pickerValue) {
    if (!pickerValue) return null;
    return pickerValue.replace("T", " ");
}

// 存储格式 → datetime-local 字符串
function fromStorageToPicker(storageValue) {
    if (!storageValue) return "";
    return storageValue.replace(" ", "T");
}

function parseTime(str){
    return new Date(str.replace(" ","T"));
}

function updateStatus(){
    const div = document.getElementById("currentStatus");
    if(currentActivity){
        div.innerText = "当前活动: " + currentActivity.theme +
        "\n开始时间: " + currentActivity.startTime;
    }else{
        div.innerText = "当前无活动";
    }
}

// --- 活动操作 ---
function startActivity(){
    if(currentActivity){
        alert("已有进行中的活动");
        return;
    }

    const theme = document.getElementById("subthemeSelect").value;
    if(!theme){
        alert("请选择主题");
        return;
    }

    currentActivity = {
        theme: theme,
        startTime: formatTime(new Date())
    };

    saveState();
    updateStatus();
}

function endActivity(){
    if(!currentActivity){
        alert("当前无活动");
        return;
    }
    pendingAction = "end";
    openModal();
}

function switchActivity(){
    const newTheme = document.getElementById("subthemeSelect").value;
    if(!newTheme){
        alert("请选择新主题");
        return;
    }

    if(!currentActivity){
        startActivity();  // 没有活动则直接开始
        return;
    }

    pendingAction = { type:"switch", newTheme:newTheme };
    openModal();
}

// --- 弹窗控制 (效率) ---
function openModal(){
    document.getElementById("effModal").style.display = "flex";
}

function closeModal(keepPending = false){
    document.getElementById("effModal").style.display = "none";
    if (!keepPending) {
        pendingAction = null;  
    }
}

function selectEfficiency(value){
    closeModal(true);

    // 结束时间就是当前时间（不再从弹窗获取）
    let endTimeStr = formatTime(new Date());

    const startTimeObj = parseTime(currentActivity.startTime);
    const endTimeObj = parseTime(endTimeStr);

    // 结束时间不能早于开始时间
    if (endTimeObj < startTimeObj) {
        alert("结束时间早于开始时间，已自动调整为开始时间后1分钟");
        const adjustedEnd = new Date(startTimeObj.getTime() + 60000);
        endTimeStr = formatTime(adjustedEnd);
    }

    const durationMin = (parseTime(endTimeStr) - startTimeObj) / 60000;

    // 保存记录
    records.push({
        theme: currentActivity.theme,
        startTime: currentActivity.startTime,
        endTime: endTimeStr,
        duration: durationMin,
        efficiency: value
    });

    // 根据操作更新当前活动
    if (pendingAction === "end") {
        currentActivity = null;
    } else if (pendingAction && pendingAction.type === "switch") {
        // 切换：新活动从此刻开始
        currentActivity = {
            theme: pendingAction.newTheme,
            startTime: formatTime(new Date())
        };
    }

    pendingAction = null;
    saveState();
    updateStatus();
    updateStats();
}

// --- 修改最新活动功能 ---
function modifyLastActivity() {
    if (records.length === 0) {
        alert("没有可修改的记录");
        return;
    }

    const last = records[records.length - 1];
    
    // 填充弹窗
    document.getElementById("modifyTheme").value = last.theme;
    document.getElementById("modifyStart").value = fromStorageToPicker(last.startTime);
    document.getElementById("modifyEnd").value = fromStorageToPicker(last.endTime);
    document.getElementById("modifyEfficiency").value = last.efficiency;
    
    document.getElementById("modifyModal").style.display = "flex";
}

function closeModifyModal() {
    document.getElementById("modifyModal").style.display = "none";
}

function saveModify() {
    if (records.length === 0) return;
    
    const newTheme = document.getElementById("modifyTheme").value;
    const newStart = document.getElementById("modifyStart").value;
    const newEnd = document.getElementById("modifyEnd").value;
    const newEfficiency = parseInt(document.getElementById("modifyEfficiency").value);
    
    if (!newTheme || !newStart || !newEnd) {
        alert("请填写完整信息");
        return;
    }
    
    const startStr = fromPickerToStorage(newStart);
    const endStr = fromPickerToStorage(newEnd);
    const startObj = parseTime(startStr);
    const endObj = parseTime(endStr);
    
    if (endObj < startObj) {
        alert("结束时间不能早于开始时间");
        return;
    }
    
    const durationMin = (endObj - startObj) / 60000;
    
    // 修改最后一条记录
    const lastIndex = records.length - 1;
    records[lastIndex] = {
        theme: newTheme,
        startTime: startStr,
        endTime: endStr,
        duration: durationMin,
        efficiency: newEfficiency
    };
    
    closeModifyModal();
    saveState();
    updateStats();
}

function deleteLastActivity() {
    if (records.length === 0) return;
    
    if (confirm("确定删除最新这条记录？")) {
        records.pop();  // 删除最后一条
        closeModifyModal();
        saveState();
        updateStats();
    }
}

// --- 数据管理 ---
function clearCurrent(){
    if(confirm("确定清除当前活动？")){
        currentActivity = null;
        saveState();
        updateStatus();
    }
}

function clearAll(){
    if(confirm("⚠ 清空所有数据？不可恢复")){
        records = [];
        currentActivity = null;
        saveState();
        updateStatus();
        updateStats();
    }
}

function exportData(){
    const exportData = {
        version:"2.0",
        export_time: formatTime(new Date()),
        records: records
    };

    const blob = new Blob([JSON.stringify(exportData,null,2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "activity_export.json";
    a.click();
    URL.revokeObjectURL(url);
}

// --- 统计与图表 ---
function updateStats(){
    let today = new Date().toDateString();
    let todaySum = 0;
    let totalSum = 0;
    let dailyMap = {};

    records.forEach(r => {
        let date = new Date(r.startTime);
        let dayStr = date.toDateString();

        totalSum += r.duration;
        if(dayStr === today) todaySum += r.duration;

        dailyMap[dayStr] = (dailyMap[dayStr] || 0) + r.duration;
    });

    document.getElementById("todayStat").innerText = "今日总时长：" + todaySum.toFixed(1) + " 分钟";
    document.getElementById("totalStat").innerText = "累计总时长：" + totalSum.toFixed(1) + " 分钟";

    drawChart(dailyMap);
}

let chart = null;

function drawChart(dailyMap){
    const ctx = document.getElementById("dailyChart").getContext("2d");
    const noDataHint = document.getElementById("noDataHint");

    const labels = Object.keys(dailyMap);
    const data = Object.values(dailyMap);

    if (labels.length === 0) {
        if (chart) { chart.destroy(); chart = null; }
        noDataHint.style.display = "block";
        ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
        return;
    } else {
        noDataHint.style.display = "none";
    }

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: '每日总分钟',
                data: data,
                backgroundColor: '#4f7eb3',
                borderRadius: 8,
                barPercentage: 0.65
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true, grid: { color: '#e0e9f2' } } }
        }
    });
}

// 页面启动
updateStatus();
updateStats();
</script>

</body>
</html>
